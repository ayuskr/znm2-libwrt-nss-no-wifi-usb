name: Build ZN M2 LiBwrt NSS NoWiFi NoUSB

on:
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * 5'

permissions:
  contents: write
  actions: write

concurrency:
  group: znm2-libwrt-nss-no-wifi-usb
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: main-nss
  CONFIG_FILE: configs/znm2.config
  DIY_SCRIPT: scripts/diy.sh
  CHECK_SCRIPT: scripts/check-no-wifi-usb.sh
  FORCE_CONFIG_SCRIPT: scripts/force-config.sh
  TZ: Asia/Shanghai
  FIRMWARE_TAG: ZN-M2-LiBwrt-NSS-NoWiFi-NoUSB

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: sbwml/actions@free-disk

      - name: Install build dependencies
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev \
            libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pip python3-ply python3-docutils python3-pyelftools \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs \
            upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd dos2unix

      - name: Clone LiBwrt source
        run: |
          git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Copy custom files
        run: |
          cp -r files openwrt/files
          cp "$CONFIG_FILE" openwrt/.config
          chmod +x "$DIY_SCRIPT" "$CHECK_SCRIPT" "$FORCE_CONFIG_SCRIPT"

      - name: Run DIY script
        run: |
          cd openwrt
          bash ../"$DIY_SCRIPT"

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a -p passwall_packages || true
          ./scripts/feeds install -a -p passwall_luci || true
          ./scripts/feeds install -a -p mosdns_luci || true
          ./scripts/feeds install luci-app-passwall luci-app-mosdns luci-app-lucky luci-app-gecoosac || true

      - name: Apply config and strict no WiFi/USB check
        run: |
          cd openwrt
          bash ../"$FORCE_CONFIG_SCRIPT"
          bash ../"$CHECK_SCRIPT"

      - name: Download package sources
        run: |
          cd openwrt
          make download -j$(nproc) V=s
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p artifact
          if [ -d openwrt/bin/targets ]; then
            find openwrt/bin/targets -type f \( -name '*sysupgrade*' -o -name '*factory*' -o -name '*.manifest' -o -name 'sha256sums' \) -exec cp -f {} artifact/ \;
          fi
          ls -lh artifact || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FIRMWARE_TAG }}-${{ github.run_number }}
          path: artifact/*
          if-no-files-found: warn

      - name: Create release
        if: success()
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.FIRMWARE_TAG }}-${{ github.run_number }}
          name: ${{ env.FIRMWARE_TAG }}-${{ github.run_number }}
          artifacts: artifact/*
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
